databases:
  - name: ems-postgres
    plan: free
    region: oregon
    databaseName: ems
    user: ems_user

services:
  - type: web
    name: ems-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: "./build.sh"
    startCommand: "python wait-for-postgres.py && PYTHONPATH=backend alembic -c backend/alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ems-postgres
          property: connectionString
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: ems
      - key: APP_VERSION
        value: 0.1.0
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: REFRESH_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: DELIVERY_START_REQUIRED_STEP
        value: PO_CREATED
      - key: CORS_ORIGINS
        value: https://ems-web.onrender.com,http://localhost:3000,http://localhost:8000
